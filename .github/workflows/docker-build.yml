name: Docker Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      publish_to_ghcr:
        description: "Publish the image to GHCR"
        required: true
        type: boolean
        default: true
      publish_to_dockerhub:
        description: "Publish the image to Docker Hub"
        required: true
        type: boolean
        default: false
      image_tag:
        description: "Tag to use for manual image publishing"
        required: true
        type: string
        default: manual

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/smartmeter-modbus-bridge
      DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/smartmeter-modbus-bridge

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve build version
        id: build-version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            version="pr-${{ github.event.pull_request.number }}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.image_tag }}"
          else
            version="dev"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "Resolved build version: ${version}"

      - name: Set add-on version in manifest
        run: |
          version="${{ steps.build-version.outputs.version }}"
          echo "Setting add-on manifest version to ${version}"
          perl -0pi -e 's/^version:\s*"[^"]*"/version: "'"${version}"'"/m' smartmeter_bridge/config.yaml
          grep '^version:' smartmeter_bridge/config.yaml

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: |
          (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))) ||
          (github.event_name == 'workflow_dispatch' && inputs.publish_to_ghcr) ||
          (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: |
          github.ref == 'refs/heads/main' ||
          startsWith(github.ref, 'refs/tags/v') ||
          (github.event_name == 'workflow_dispatch' && inputs.publish_to_dockerhub) ||
          (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract GHCR Docker metadata
        if: |
          (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))) ||
          (github.event_name == 'workflow_dispatch' && inputs.publish_to_ghcr)
        id: meta-ghcr
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=sha,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=edge,enable=${{ github.event_name == 'push' && github.ref_name == 'main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=tag,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Extract PR GHCR Docker metadata
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        id: meta-ghcr-pr
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=pr-${{ github.event.pull_request.number }}

      - name: Extract Docker Hub metadata
        if: |
          github.ref == 'refs/heads/main' ||
          startsWith(github.ref, 'refs/tags/v') ||
          (github.event_name == 'workflow_dispatch' && inputs.publish_to_dockerhub)
        id: meta-dockerhub
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=tag,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.publish_to_dockerhub }}

      - name: Build multi-arch Docker image for GHCR
        if: |
          (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))) ||
          (github.event_name == 'workflow_dispatch' && inputs.publish_to_ghcr)
        uses: docker/build-push-action@v6
        with:
          context: ./smartmeter_bridge
          file: ./smartmeter_bridge/Dockerfile.standalone
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6
          push: true
          tags: ${{ steps.meta-ghcr.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ steps.build-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build multi-arch Docker image for GHCR on pull requests
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/build-push-action@v6
        with:
          context: ./smartmeter_bridge
          file: ./smartmeter_bridge/Dockerfile.standalone
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6
          push: true
          tags: ${{ steps.meta-ghcr-pr.outputs.tags }}
          labels: ${{ steps.meta-ghcr-pr.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ steps.build-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build multi-arch Docker image for Docker Hub
        if: |
          github.event_name == 'workflow_dispatch' && inputs.publish_to_dockerhub
        uses: docker/build-push-action@v6
        with:
          context: ./smartmeter_bridge
          file: ./smartmeter_bridge/Dockerfile.standalone
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6
          push: true
          tags: ${{ steps.meta-dockerhub.outputs.tags }}
          labels: ${{ steps.meta-dockerhub.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ steps.build-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate multi-arch Docker build for fork pull requests
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        uses: docker/build-push-action@v6
        with:
          context: ./smartmeter_bridge
          file: ./smartmeter_bridge/Dockerfile.standalone
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6
          push: false
          tags: ${{ env.GHCR_IMAGE }}:pr-${{ github.event.pull_request.number }}
          build-args: |
            BUILD_VERSION=${{ steps.build-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
