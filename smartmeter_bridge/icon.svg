<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Smartmeter Bridge icon</title>
  <desc id="desc">A stylized bridge connecting two nodes with electric signal accents.</desc>
  <defs>
    <linearGradient id="bg" x1="24" y1="24" x2="232" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f3d5e"/>
      <stop offset="1" stop-color="#22a06b"/>
    </linearGradient>
    <linearGradient id="bridge" x1="52" y1="168" x2="204" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f5fbff"/>
      <stop offset="1" stop-color="#bfe9ff"/>
    </linearGradient>
  </defs>

  <rect x="12" y="12" width="232" height="232" rx="52" fill="url(#bg)"/>

  <circle cx="56" cy="180" r="18" fill="#ffd166"/>
  <circle cx="200" cy="180" r="18" fill="#ffd166"/>
  <circle cx="56" cy="180" r="7" fill="#0f3d5e"/>
  <circle cx="200" cy="180" r="7" fill="#0f3d5e"/>

  <path
    d="M56 180 H96 L128 94 L160 180 H200"
