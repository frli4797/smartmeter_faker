  />

  <path
    d="M84 180 C94 132 111 108 128 108 C145 108 162 132 172 180"
    fill="none"
    stroke="#7fd3ff"
    stroke-linecap="round"
    stroke-width="10"
    opacity="0.95"
  />

  <path
    d="M104 72 L118 86 L108 86 L122 104"
    fill="none"
    stroke="#ffd166"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-width="8"
  />

  <path
    d="M148 72 L162 86 L152 86 L166 104"
    fill="none"
    stroke="#ffd166"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-width="8"
  />

  <rect x="92" y="172" width="72" height="16" rx="8" fill="#e7f7ff"/>
</svg>
